<section id="s01-landing">
  <!-- Layer 1: video nền -->
  <video autoplay muted playsinline id="landingVideo">
    <source src="assets/section_1_1.mp4" type="video/mp4">
  </video>

  <!-- Layer 2: text reveal theo mask -->
  <div id="text-layer">
    <span class="text-step step-1">wrapper</span>
    <span class="text-step step-2">cut strips</span>
    <span class="text-step step-3">rolled strands</span>
    <span class="text-step step-4">woven object</span>
  </div>

  <!-- Layer 2.5: 3D model reveal theo mask (Scaniverse) -->
  <div class="model-3d-wrap">
    <iframe width="100%" height="100%" frameborder="0" allowfullscreen
      src="https://scaniverse.com/scan/6rqpguq6fpw7kwrx?embed=1"></iframe>
  </div>

  <!-- Layer 3: slide bar container -->
  <div id="bar-layer">
    <img src="assets/section_1_slide_bar.png" class="track-bg" alt="">

    <!-- Layer 4: handle button inside the track -->
    <div id="slider-handle-wrap" class="nudge-anim">
      <img src="assets/section_1_slide_button.png" alt="">
    </div>
  </div>

  <!-- Vùng drag invisible -->
  <div id="drag-zone"></div>
</section>
