<section id="s02-material">
  <video muted playsinline id="video-s02" onended="this.parentElement.classList.add('video-ended')">
    <source src="assets/section_2_1.mp4" type="video/mp4">
  </video>
  <img src="assets/section_2_background.png" id="bg-s02" alt="Background">

  <div class="s02-labels">
    <!-- 4 nút tròn tương tác -->
    <div class="s02-btn btn-1"></div>
    <div class="s02-btn btn-2"></div>
    <div class="s02-btn btn-3"></div>
    <div class="s02-btn btn-4"></div>

    <span class="s02-label label-1">Color</span>
    <span class="s02-label label-2">Hard Edges</span>
    <span class="s02-label label-3">Flexibility</span>
    <span class="s02-label label-4">Plastic Texture</span>

    <!-- Vùng màu đỏ bên phải -->
    <div id="s02-hover-zone"></div>

    <!-- Bạn có thể điều chỉnh vị trí của nút click này trong CSS bằng #s02-click-hint -->
    <img src="assets/section_2_background_click.png" id="s02-click-hint" alt="Click hint">

    <!-- 5 Dropdown images -->
    <img src="assets/section_2_dropdown_4.png" class="s02-dropdown-tooltip" id="dropdown-1" alt="Dropdown 1">
    <img src="assets/section_2_dropdown_1.png" class="s02-dropdown-tooltip" id="dropdown-2" alt="Dropdown 2">
    <img src="assets/section_2_dropdown_2.png" class="s02-dropdown-tooltip" id="dropdown-3" alt="Dropdown 3">
    <img src="assets/section_2_dropdown_3.png" class="s02-dropdown-tooltip" id="dropdown-4" alt="Dropdown 4">
    <!-- <img src="assets/section_2_dropdown.png" class="s02-dropdown" id="dropdown-main" alt="Dropdown Main"> -->
  </div>
</section>
